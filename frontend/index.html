<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | Basketball Association</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
</head>

<body class="bg-dark text-light">

  <div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 shadow-lg login-card">
      <h2 class="text-center mb-3">Domain Basketball Association</h2>
      <p class="text-center text-muted mb-4">Inicia sesión para acceder al sistema</p>

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input id="email" type="email" class="form-control" placeholder="admin@gmail.com">
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input id="password" type="password" class="form-control" placeholder="123456">
      </div>

      <button class="btn btn-primary w-100" onclick="login()">Entrar</button>

      <p id="msg" class="text-center mt-3 text-danger"></p>

      <hr class="my-3">

      <p class="text-center small text-muted">
        Demo Admin: <b>admin@gmail.com</b> / <b>123456</b>
      </p>
    </div>
  </div>

  <script src="assets/app.js"></script>
</body>
</html>
