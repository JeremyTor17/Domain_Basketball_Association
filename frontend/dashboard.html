<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard | Domain Basketball Association</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
</head>

<body class="bg-light">

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
    <a class="navbar-brand fw-bold" href="#">Domain Basketball Association</a>

    <div class="ms-auto d-flex align-items-center gap-2">
      <span class="text-white small" id="userInfo"></span>
      <button class="btn btn-danger btn-sm" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="container mt-4">

    <!-- NAV TABS -->
    <ul class="nav nav-tabs">
      <li class="nav-item">
        <button class="nav-link active" onclick="showTab('teams', this)">Teams</button>
      </li>
      <li class="nav-item">
        <button class="nav-link" onclick="showTab('players', this)">Players</button>
      </li>
      <li class="nav-item">
        <button class="nav-link" onclick="showTab('games', this)">Games</button>
      </li>
      <li class="nav-item">
        <button class="nav-link" onclick="showTab('stats', this)">Stats</button>
      </li>
    </ul>

    <!-- TEAMS -->
    <div id="teams" class="tab-content mt-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="fw-bold">Equipos</h3>
        <button class="btn btn-success" onclick="loadTeams()">🔄 Refrescar</button>
      </div>

      <div class="card p-3 shadow-sm mb-3">
        <h5 class="fw-bold">Crear Equipo</h5>

        <div class="row g-2">
          <div class="col-md-5">
            <input id="teamName" class="form-control" placeholder="Nombre del equipo">
          </div>
          <div class="col-md-5">
            <input id="teamCity" class="form-control" placeholder="Ciudad">
          </div>
          <div class="col-md-2">
            <button class="btn btn-primary w-100" onclick="createTeam()">Crear</button>
          </div>
        </div>
      </div>

      <table class="table table-striped table-bordered shadow-sm">
        <thead class="table-dark">
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Ciudad</th>
            <th style="width: 200px;">Acciones</th>
          </tr>
        </thead>
        <tbody id="teamsTable"></tbody>
      </table>
    </div>

    <!-- PLAYERS -->
    <div id="players" class="tab-content mt-4 d-none">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="fw-bold">Jugadores</h3>
        <button class="btn btn-success" onclick="loadPlayers()">🔄 Refrescar</button>
      </div>

      <table class="table table-striped table-bordered shadow-sm">
        <thead class="table-dark">
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Posición</th>
            <th>Equipo ID</th>
          </tr>
        </thead>
        <tbody id="playersTable"></tbody>
      </table>
    </div>

    <!-- GAMES -->
    <div id="games" class="tab-content mt-4 d-none">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="fw-bold">Partidos</h3>
        <button class="btn btn-success" onclick="loadGames()">🔄 Refrescar</button>
      </div>

      <table class="table table-striped table-bordered shadow-sm">
        <thead class="table-dark">
          <tr>
            <th>ID</th>
            <th>Local</th>
            <th>Visitante</th>
            <th>Fecha</th>
            <th>Puntos Local</th>
            <th>Puntos Visitante</th>
          </tr>
        </thead>
        <tbody id="gamesTable"></tbody>
      </table>
    </div>

    <!-- STATS -->
    <div id="stats" class="tab-content mt-4 d-none">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="fw-bold">Estadísticas</h3>
        <button class="btn btn-success" onclick="loadStats()">🔄 Refrescar</button>
      </div>

      <table class="table table-striped table-bordered shadow-sm">
        <thead class="table-dark">
          <tr>
            <th>ID</th>
            <th>Jugador</th>
            <th>Puntos</th>
            <th>Rebotes</th>
            <th>Asistencias</th>
          </tr>
        </thead>
        <tbody id="statsTable"></tbody>
      </table>
    </div>

  </div>

  <script src="assets/app.js"></script>
</body>
</html>
